apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-api
  template:
    metadata:
      labels:
        app: sentinel-api
    spec:
      containers:
        - name: api
          image: ghcr.io/example/sentinel-doorbell-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: sentinel-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-api
spec:
  selector:
    app: sentinel-api
  ports:
    - port: 80
      targetPort: 8000

