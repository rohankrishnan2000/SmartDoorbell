apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentinel-dashboard
  template:
    metadata:
      labels:
        app: sentinel-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/example/sentinel-doorbell-dashboard:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-dashboard
spec:
  type: LoadBalancer
  selector:
    app: sentinel-dashboard
  ports:
    - port: 80
      targetPort: 80

